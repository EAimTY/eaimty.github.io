<script type="text/javascript">

// 初始化地图数据
var map = new Array();
for (let i = 0; i < 20; i++) {
  map[i] = new Array();
  for (let j = 0; j < 20; j++) {
    map[i][j] = new Array();

    // 存储 cell 对象
    map[i][j][0] = document.getElementById(i + '_' + j);

    // 存储 cell 中是否有蛇（0 - 无，1 - 有）
    map[i][j][1] = 0;

    // 存储 cell 中是蛇的哪一部分，无蛇时，若值为0则为食物
    map[i][j][2] = 1;

    // 存储 cell 在本次地图更新中是否已经变化（0 - 否，1 - 是）
    map[i][j][3] = 0;
  }
}

// 初始化蛇
map[0][0][0].classList.add("snake");
map[0][0][1] = 1;
map[0][0][2] = 3;
map[0][1][0].classList.add("snake");
map[0][1][1] = 1;
map[0][1][2] = 2;
map[0][2][0].classList.add("snake");
map[0][2][1] = 1;
map[0][2][2] = 1;

// 初始化食物
addFood();

// 初始化蛇的长度
var length = 3;

// 初始化食物被吃状态
var ate = 0;

// 定义蛇的实际行动方向与新行动方向（0 - 上，1 - 右，2 - 下，3 - 左）
var newDirection = 1;
var currentDirection = 1;

// 监听键盘，更新新行动方向
window.onkeydown = function(e) {
  if (e.key == "ArrowUp" && currentDirection != 2) {
    newDirection = 0;
  } else if (e.key == "ArrowRight" && currentDirection != 3) {
    newDirection = 1;
  } else if (e.key == "ArrowDown" && currentDirection != 0) {
    newDirection = 2;
  } else if (e.key == "ArrowLeft" && currentDirection != 1) {
    newDirection = 3;
  }
};

// 创建定时器
var timer = setInterval(updateMap, 150);

// 食物创建函数
function addFood() {
  while (1) {
    var foodX = Math.floor(Math.random() * 20);
    var foodY = Math.floor(Math.random() * 20);
    if (map[foodX][foodY][1] == 0) {
      map[foodX][foodY][2] = 0;
      break;
    }
  }
}

// 地图更新函数
function updateMap() {

  // 遍历地图并更新数据
  for (let i = 0; i < 20; i++) {
    for (let j = 0; j < 20; j++) {

      // 如果 cell 中有蛇且在本次更新还中未变化
      if (map[i][j][1] == 1 && map[i][j][3] == 0) {

        // 如果是蛇头
        if (map[i][j][2] == 1) {

          // 前进
          if (newDirection == 0) {

            // 若前方不是墙壁且不是自身，或前方是在本次地图更新中还未更新过的蛇尾
            if (i > 0 && (map[i - 1][j][1] == 0 || (map[i - 1][j][1] == 1 && map[i - 1][j][3] == 0 && map[i - 1][j][2] == length))) {

              // 判断前方是否为食物
              if (map[i - 1][j][2] == 0) {
                length++;
                map[i - 1][j][0].classList.remove("food");
                ate = 1;
              }

              // 移动蛇头
              map[i - 1][j][1] = 1;
              map[i - 1][j][2] = 1;
              map[i - 1][j][3] = 1;

            // 若碰壁或碰到自身则停止定时器
            } else {
              clearInterval(timer);
            }

          } else if (newDirection == 1) {
            if (j < 19 && (map[i][j + 1][1] == 0 || (map[i][j + 1][1] == 1 && map[i][j + 1][3] == 0 && map[i][j + 1][2] == length))) {
              if (map[i][j + 1][2] == 0) {
                length++;
                map[i][j + 1][0].classList.remove("food");
                ate = 1;
              }
              map[i][j + 1][1] = 1;
              map[i][j + 1][2] = 1;
              map[i][j + 1][3] = 1;
            } else {
              clearInterval(timer);
            }
          } else if (newDirection == 2) {
            if (i < 19 && (map[i + 1][j][1] == 0 || (map[i + 1][j][1] == 1 && map[i + 1][j][3] == 0 && map[i + 1][j][2] == length))) {
              if (map[i + 1][j][2] == 0) {
                length++;
                map[i + 1][j][0].classList.remove("food");
                ate = 1;
              }
              map[i + 1][j][1] = 1;
              map[i + 1][j][2] = 1;
              map[i + 1][j][3] = 1;
            } else {
              clearInterval(timer);
            }
          } else if (newDirection == 3) {
            if (j > 0 && (map[i][j - 1][1] == 0 || (map[i][j - 1][1] == 1 && map[i][j - 1][3] == 0 && map[i][j - 1][2] == length))) {
              if (map[i][j - 1][2] == 0) {
                length++;
                map[i][j - 1][0].classList.remove("food");
                ate = 1;
              }
              map[i][j - 1][1] = 1;
              map[i][j - 1][2] = 1;
              map[i][j - 1][3] = 1;
            } else {
              clearInterval(timer);
            }
          }

        }

        // 判断是否是蛇尾
        if (map[i][j][2] == length) {
          map[i][j][1] = 0;
          map[i][j][2] = 1;
        } else {
          map[i][j][2]++;
          map[i][j][3] = 1;
        }

      }

    }
  }

  if (ate == 1) {
    addFood();
    ate = 0;
  }

  // 重绘地图
  for (let i = 0; i < 20; i++) {
    for (let j = 0; j < 20; j++) {
      if (map[i][j][1] == 1) {
        map[i][j][0].classList.add("snake");
      } else {
        map[i][j][0].classList.remove("snake");
        if (map[i][j][2] == 0) {
          map[i][j][0].classList.add("food");
        }
      }
      map[i][j][3] = 0;
    }
  }

  // 更新实际行动方向
  currentDirection = newDirection;
}

</script>
</html>
